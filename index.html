<!DOCTYPE html>
<html>
<head>
    <title>WELTRAF</title>
    <style>
        body { background: #c00000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 20px; text-align: center; color: #333; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #c00000; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#c00000">WELTRAF</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button onclick="login()">LOGIN</button>
    </div>

    <script>
        
  async function login() {
    const u = document.getElementById('u').value;
    const p = document.getElementById('p').value;

    if (u === "" || p === "") {
        alert("Isi dulu bos!");
        return;
    }

    // UPDATE: Mengirim data sebagai JSON
    const response = await fetch('/auth-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }, // Pastikan ini JSON
        body: JSON.stringify({ username: u, password: p }) // Pastikan ini stringify
    });

    const result = await response.json();

    if (result.success) {
        window.location.href = "login.html";
    } else {
        alert(result.message);
    }
}
</script>
    
</body>
</html>
