<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELTRAF - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #c00000; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }
        .login-container { display: flex; width: 95%; max-width: 1200px; height: 85vh; align-items: center; }
        .login-form-section { flex: 1; padding: 50px; display: flex; flex-direction: column; align-items: center; }
        .login-form-section h1 { font-size: 3.5rem; margin-bottom: 30px; font-weight: bold; }
        .input-group { width: 100%; max-width: 350px; margin-bottom: 15px; }
        input { width: 100%; padding: 15px 20px; background: white; border: none; border-radius: 12px; font-size: 1rem; outline: none; color: #333; }
        .forgot { color: white; text-decoration: underline; font-size: 0.9rem; margin-bottom: 25px; cursor: pointer; }
        .login-btn { width: 100%; max-width: 350px; padding: 15px; background: white; border: none; border-radius: 30px; color: #c00000; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background: #f0f0f0; transform: scale(1.02); }
        /* Pastikan file gambar ini ada di folder yang sama di GitHub */
        .image-section { flex: 1.5; height: 100%; background: url('WhatsApp Image 2026-04-17 at 15.36.10.jpeg') no-repeat center center; background-size: cover; border-radius: 60px; }
        @media (max-width: 768px) { .image-section { display: none; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form-section">
            <h1>WELTRAF</h1>
            <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="input-group">
                    <input type="text" id="username" placeholder="username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="password" required>
                </div>
                <p class="forgot">Forget Password ?</p>
                <button type="button" onclick="checkLogin()" class="login-btn">LOGIN</button>
            </div>
        </div>
        <div class="image-section"></div>
    </div>

    <script>

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user !== "" && pass !== "") {
                // Berpindah ke halaman login.html
                window.location.href = "login.html";
            } else {
                alert("Masukkan username dan password terlebih dahulu!");
