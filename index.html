<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - Weltraf</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-96 text-center">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Monitoring Produksi</h2>
        <input id="user" type="text" placeholder="Username" class="w-full p-3 border rounded mb-4 outline-none focus:ring-2 focus:ring-blue-500">
        <input id="pass" type="password" placeholder="Password" class="w-full p-3 border rounded mb-6 outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="doLogin()" id="btnLogin" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700 transition">Login</button>
        <p class="mt-4 text-xs text-gray-400">© 2026 PT SYMPHOS ELECTRIC</p>
    </div>

    <script>
        async function doLogin() {
            const btn = document.getElementById('btnLogin');
            btn.innerText = "Mengecek...";
            
            try {
                const res = await fetch('/auth-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: document.getElementById('user').value, 
                        password: document.getElementById('pass').value 
                    })
                });

                if (res.ok) {
                    window.location.href = 'login.html';
                } else {
                    alert("Gagal terhubung ke server! Cek koneksi atau MongoDB.");
                    btn.innerText = "Login";
                }
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "Login";
            }
        }
    </script>
</body>
</html>
