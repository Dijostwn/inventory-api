<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Monitoring - Weltraf</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Monitoring Produksi Trafo</h1>
            <button onclick="window.location.href='update-progress.html'" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">Update Progress</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full border-collapse border border-gray-300 text-center text-[12px]">
                <thead class="bg-gray-200 uppercase font-bold text-gray-700">
                    <tr>
                        <th class="border p-3">No Order</th>
                        <th class="border p-2">Tank</th>
                        <th class="border p-2">Core</th>
                        <th class="border p-2">Coil</th>
                        <th class="border p-2">Assy</th>
                        <th class="border p-2">Conn</th>
                        <th class="border p-2">Final</th>
                        <th class="border p-2">Test</th>
                        <th class="border p-2">Finish</th>
                        <th class="border p-2">FAT</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/projects');
                const data = await res.json();
                const body = document.getElementById('table-body');
                body.innerHTML = '';

                const getColor = (s) => {
                    if (s === 'Selesai (Hijau)' || s === 'Selesai') return 'bg-green-500';
                    if (s === 'In Progress (Kuning)' || s === 'In Progress') return 'bg-yellow-400';
                    return 'bg-red-500'; 
                };

                data.forEach(p => {
                    body.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="border p-3 font-bold uppercase text-gray-800 bg-gray-50">${p.no_order}</td>
                            <td class="border p-3 ${getColor(p.tank_making)}"></td>
                            <td class="border p-3 ${getColor(p.core_making)}"></td>
                            <td class="border p-3 ${getColor(p.coil_making)}"></td>
                            <td class="border p-3 ${getColor(p.core_coil_assy)}"></td>
                            <td class="border p-3 ${getColor(p.connection)}"></td>
                            <td class="border p-3 ${getColor(p.final_assy)}"></td>
                            <td class="border p-3 ${getColor(p.internal_test)}"></td>
                            <td class="border p-3 ${getColor(p.finishing)}"></td>
                            <td class="border p-3 ${getColor(p.fat)}"></td>
                        </tr>`;
                });
            } catch (err) { console.error(err); }
        }
        loadData();
        setInterval(loadData, 5000); // Auto-refresh data tiap 5 detik
    </script>
</body>
</html>
