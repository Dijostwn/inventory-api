<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <div class="flex justify-between mb-6">
            <h1 class="text-xl font-bold">Monitoring Produksi Trafo</h1>
            <button onclick="location.href='update-progress.html'" class="bg-blue-600 text-white px-4 py-2 rounded">Update Progress</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full border-collapse text-center text-[11px]">
                <thead class="bg-gray-200 uppercase font-bold">
                    <tr>
                        <th class="border p-2">No Order</th>
                        <th class="border p-2">Tank</th>
                        <th class="border p-2">Core</th>
                        <th class="border p-2">Coil</th>
                        <th class="border p-2">Assy</th>
                        <th class="border p-2">Conn</th>
                        <th class="border p-2">Final</th>
                        <th class="border p-2">Test</th>
                        <th class="border p-2">Finish</th>
                        <th class="border p-2">FAT</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
    <script>
        async function loadData() {
            const res = await fetch('/api/projects');
            const data = await res.json();
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            
            const getColor = (s) => {
                if (s === 'Selesai (Hijau)') return 'bg-green-500 text-transparent';
                if (s === 'In Progress (Kuning)') return 'bg-yellow-400 text-transparent';
                return 'bg-red-500 text-transparent';
            };

            data.forEach(p => {
                body.innerHTML += `
                    <tr>
                        <td class="border p-2 font-bold uppercase bg-gray-50">${p.no_order}</td>
                        <td class="border p-2 ${getColor(p.tank_making)}">.</td>
                        <td class="border p-2 ${getColor(p.core_making)}">.</td>
                        <td class="border p-2 ${getColor(p.coil_making)}">.</td>
                        <td class="border p-2 ${getColor(p.core_coil_assy)}">.</td>
                        <td class="border p-2 ${getColor(p.connection)}">.</td>
                        <td class="border p-2 ${getColor(p.final_assy)}">.</td>
                        <td class="border p-2 ${getColor(p.internal_test)}">.</td>
                        <td class="border p-2 ${getColor(p.finishing)}">.</td>
                        <td class="border p-2 ${getColor(p.fat)}">.</td>
                    </tr>`;
            });
        }
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
