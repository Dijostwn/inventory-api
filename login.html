<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Produksi Trafo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded-lg shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Monitoring Fabrikasi Trafo</h1>
            <button onclick="window.location.href='update-progress.html'" class="bg-blue-600 text-white px-4 py-2 rounded">Update Progress</button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse border border-gray-300 text-center text-xs">
                <thead class="bg-gray-200">
                    <tr>
                        <th rowspan="2" class="border p-2">No Order</th>
                        <th colspan="6" class="border p-2">Proses Fabrikasi</th>
                        <th rowspan="2" class="border p-2">Internal Test</th>
                        <th rowspan="2" class="border p-2">Finishing</th>
                        <th rowspan="2" class="border p-2">FAT</th>
                    </tr>
                    <tr class="bg-gray-100">
                        <th class="border p-1">Tank Making</th>
                        <th class="border p-1">Core Making</th>
                        <th class="border p-1">Coil Making</th>
                        <th class="border p-1">C&C Assy</th>
                        <th class="border p-1">Connection</th>
                        <th class="border p-1">Final Assy</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            const res = await fetch('/api/projects');
            const data = await res.json();
            const body = document.getElementById('table-body');
            body.innerHTML = '';

            const getColor = (s) => {
                if(s === 'Selesai') return 'bg-green-500';
                if(s === 'In Progress') return 'bg-yellow-400';
                return 'bg-red-500'; // Default Pending
            };

            data.forEach(p => {
                body.innerHTML += `
                    <tr>
                        <td class="border p-3 font-bold bg-gray-50">${p.no_order}</td>
                        <td class="border p-3 ${getColor(p.tank_making)}"></td>
                        <td class="border p-3 ${getColor(p.core_making)}"></td>
                        <td class="border p-3 ${getColor(p.coil_making)}"></td>
                        <td class="border p-3 ${getColor(p.core_coil_assy)}"></td>
                        <td class="border p-3 ${getColor(p.connection)}"></td>
                        <td class="border p-3 ${getColor(p.final_assy)}"></td>
                        <td class="border p-3 ${getColor(p.internal_test)}"></td>
                        <td class="border p-3 ${getColor(p.finishing)}"></td>
                        <td class="border p-3 ${getColor(p.fat)}"></td>
                    </tr>
                `;
            });
        }
        setInterval(loadData, 5000); // Auto refresh tiap 5 detik
        loadData();
    </script>
</body>
</html>
